name: Build and Deploy to Aliyun ACR

on:
  push:
    branches:
      - main

env:
  ACR_REGISTRY: crpi-df6i5zrps8a8t6ig.cn-shenzhen.personal.cr.aliyuncs.com
  IMAGE_NAME: song52wow/tizhongji-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          AUTH_SECRET: ${{ vars.AUTH_SECRET }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/server_key
          chmod 600 /tmp/server_key

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i /tmp/server_key ${SERVER_USER}@${SERVER_HOST} << 'ENDSSH'
            set -e

            cd ${DEPLOY_PATH}

            # Pull latest image from ACR
            docker pull ${ACR_REGISTRY}/${IMAGE_NAME}:latest

            # Create .env file
            cat > .env << 'ENVEOF'
            AUTH_SECRET=${AUTH_SECRET}
            ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
            NODE_ENV=production
            PORT=3000
            RATE_LIMIT_MAX=10000
            LOG_LEVEL=info
            ENVEOF

            # Update docker-compose image and restart
            IMAGE=${ACR_REGISTRY}/${IMAGE_NAME}:latest docker-compose up -d --no-deps

            # Clean up old images
            docker image prune -f
          ENDSSH

          rm /tmp/server_key

      - name: Health check
        run: |
          sleep 10
          curl -s https://tizhongji.cisonc.site/health || echo "Health check skipped"